<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    h1 { font-size: 3rem; font-weight: 700; margin-bottom: 1rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 1.125rem; color: #94a3b8; max-width: 32rem; margin-bottom: 2rem; line-height: 1.6; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    a { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    a.primary { background: #3b82f6; color: #fff; }
    a.primary:hover { background: #2563eb; transform: translateY(-1px); }
    a.secondary { background: #334155; color: #f1f5f9; }
    a.secondary:hover { background: #475569; transform: translateY(-1px); }
    .status { margin-top: 2rem; padding: 0.75rem 1.5rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; font-size: 0.875rem; color: #60a5fa; }
  </style>
</head>
<body>
  <h1>AI CRM</h1>
  <p>Intelligent lead management, pipeline tracking, and AI-powered sales insights for modern teams.</p>
  <div class="links">
    <a href="http://localhost:3000" class="primary">Open App</a>
    <a href="http://localhost:4000/api/docs" class="secondary">API Docs</a>
  </div>
  <div class="status">Backend: <span id="backend-status">Checking...</span></div>
  <script>
    fetch('http://localhost:4000/api/v1/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: 'admin@aicrm.com', password: 'password123' }) })
      .then(r => r.ok ? document.getElementById('backend-status').textContent = 'Online' : document.getElementById('backend-status').textContent = 'Error')
      .catch(() => document.getElementById('backend-status').textContent = 'Offline');
  </script>
</body>
</html>
